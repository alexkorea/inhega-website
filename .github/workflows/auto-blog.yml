name: Auto Blog Post

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate blog post
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: '5533847195'
        run: |
          TOPICS=(
            "음식점 영업허가 신청 절차 완벽 가이드"
            "숙박업 허가 신청 방법과 필요서류"
            "건설업 등록 절차와 자격요건 안내"
            "통신판매업 신고 방법 총정리"
            "의료기관 개설 신고 절차와 주의사항"
            "화물운송사업 허가 신청 가이드"
            "교육시설 학원 설립 등록 절차"
            "미용업 등록 신고 방법과 시설기준"
            "부동산중개업 등록 절차와 필요서류"
            "약국 개설 등록 절차 완벽 안내"
          )

          DAY=$(date +%-j)
          INDEX=$((DAY % ${#TOPICS[@]}))
          TOPIC="${TOPICS[$INDEX]}"
          DATE=$(date +%Y-%m-%d)
          SLUG="post-$(date +%s | tail -c 9)"

          RESPONSE=$(curl -s "https://models.inference.ai.azure.com/chat/completions" \
            -H "Authorization: Bearer $GH_MODELS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg topic "$TOPIC" \
              '{
                model: "gpt-4o-mini",
                max_tokens: 16000,
                temperature: 0.7,
                messages: [
                  {role: "system", content: "You are a professional blog writer for 인허가 업무 전문 행정사사무소, specializing in Korean business permits and licenses. Write a blog article in clean MARKDOWN format (NOT HTML). Rules: Use ## for h2, ### for h3. Use markdown tables. Add 5+ FAQ. Add internal links. 15000+ characters. Write in Korean."},
                  {role: "user", content: $topic}
                ]
              }')")

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$CONTENT" ]; then
            curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=❌ inhega 블로그 생성 실패: ${TOPIC}"
            exit 1
          fi

          cat > "content/blog/${SLUG}.md" << BLOGEOF
---
          title: "${TOPIC}"
          date: "${DATE}"
          category: "blog"
          excerpt: "${TOPIC}"
          image: "/slides/documents.jpg"
          slug: "${SLUG}"
---

${CONTENT}
          BLOGEOF

          sed -i 's/^          //' "content/blog/${SLUG}.md"

          git config user.name "inhega Bot"
          git config user.email "bot@inhega.co.kr"
          git add "content/blog/${SLUG}.md"
          git commit -m "blog: ${TOPIC}"
          git push

          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=✅ inhega 블로그 발행 완료!

          제목: ${TOPIC}
          파일: ${SLUG}.md
          날짜: ${DATE}"
